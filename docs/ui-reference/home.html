<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wallet</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --navy: #002887;
        --box: #002854;
        --button: #00247d;
        --bg: #f0f3f8;
        --card-bg: #ffffff;
        --text-main: #1a2a42;
        --text-sub: #6d7a8d;
        --border: #e2e8f0;
        --shadow: 0 2px 12px rgba(15, 40, 73, 0.08);
        --shadow-card: 0 4px 20px rgba(15, 40, 73, 0.13);
      }

      body {
        font-family: "Sarabun", sans-serif;
        background: var(--bg);
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
        padding: 20px 0;
      }

      .phone {
        width: 390px;
        min-height: 844px;
        background: var(--bg);
        border-radius: 40px;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(15, 40, 73, 0.25);
        display: flex;
        flex-direction: column;
        position: relative;
      }

      /* STATUS BAR */
      .status-bar {
        background: var(--navy);
        padding: 12px 24px 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: white;
        font-size: 13px;
        font-weight: 500;
      }

      .status-bar .time {
        font-weight: 600;
      }

      .status-icons {
        display: flex;
        gap: 6px;
        align-items: center;
      }

      .status-icons img {
        width: 16px;
        height: 16px;
        object-fit: contain;
      }

      /* TOP BAR */
      .topbar {
        background: var(--navy);
        padding: 6px 24px 18px;
        text-align: center;
      }

      .topbar h1 {
        color: white;
        font-size: 24px;
        font-weight: 600;
        letter-spacing: 0.3px;
      }

      /* CONTENT */
      .content {
        flex: 1;
        padding: 20px 16px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        overflow-y: auto;
        padding-bottom: 90px;
      }

      /* PROFILE CARD */
      .profile-card {
        background: var(--box);
        border-radius: 18px;
        padding: 20px;
        display: flex;
        align-items: center;
        gap: 18px;
        box-shadow: var(--shadow-card);
        position: relative;
        overflow: hidden;
      }
      .profile-photo img {
        width: 120px;
        height: 141px;
        object-fit: cover;
        display: block;
      }

      .profile-info {
        flex: 1;
        z-index: 1;
      }

      .profile-info .name {
        color: white;
        font-size: 16px;
        font-weight: 600;
        line-height: 1.4;
        margin-bottom: 6px;
      }

      .profile-info .id {
        color: rgba(255, 255, 255, 0.65);
        font-size: 13px;
      }

      /* MENU ITEMS */
      .menu-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .menu-item {
        background: var(--card-bg);
        border-radius: 14px;
        padding: 16px 18px;
        display: flex;
        align-items: center;
        gap: 14px;
        box-shadow: var(--shadow);
        cursor: pointer;
        transition:
          transform 0.15s ease,
          box-shadow 0.15s ease;
        text-decoration: none;
      }

      .menu-item:active {
        transform: scale(0.98);
        box-shadow: 0 1px 6px rgba(15, 40, 73, 0.06);
      }

      .menu-icon {
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .menu-icon img {
        width: 32px;
        height: 32px;
        object-fit: contain;
      }

      .menu-label {
        flex: 1;
        font-size: 16px;
        font-weight: 500;
        color: var(--text-main);
      }

      .menu-arrow {
        color: var(--text-sub);
        font-size: 24px;
      }

      .menu-badge {
        background: var(--navy);
        color: white;
        font-size: 13px;
        font-weight: 500;
        padding: 5px 14px;
        border-radius: 20px;
        white-space: nowrap;
      }

      /* BOTTOM NAV */
      .bottom-nav {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 76px;
        background: white;
        border-top: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-around;
        padding: 0 8px 8px;
        box-shadow: 0 -4px 20px rgba(15, 40, 73, 0.07);
      }

      .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: 6px 12px;
        cursor: pointer;
        flex: 1;
      }

      .nav-item img {
        width: 24px;
        height: 24px;
        object-fit: contain;
        opacity: 0.45;
      }

      .nav-item.active img {
        opacity: 1;
      }

      .nav-item span {
        font-size: 11px;
        color: var(--text-sub);
        font-weight: 400;
      }

      .nav-item.active span {
        color: var(--navy);
        font-weight: 600;
      }

      .nav-indicator {
        width: 28px;
        height: 3px;
        background: var(--navy);
        border-radius: 2px;
        margin-top: 2px;
      }
    </style>
  </head>
  <body>
    <div class="phone">
      <!-- STATUS BAR -->
      <div class="status-bar">
        <span class="time">9:51 PM</span>
        <div class="status-icons">
          <img src="รูป/Signal.png" alt="" />
          <img src="รูป/Wi-Fi.png" alt="" />
          <img src="รูป/Battery.png" alt="" />
        </div>
      </div>

      <!-- TOP BAR -->
      <div class="topbar">
        <h1>Wallet</h1>
      </div>

      <!-- CONTENT -->
      <div class="content">
        <!-- PROFILE CARD -->
        <div class="profile-card">
          <div class="profile-photo">
            <img src="รูป/image 32.png" alt="profile" />
          </div>
          <div class="profile-info">
            <div class="name">นางสาว พิชญา รุ่งเรืองกิต</div>
            <div class="id">ID card : 1-1009-000XX-XX-XX</div>
          </div>
        </div>

        <!-- MENU LIST -->
        <div class="menu-list">
          <!-- ID Card -->
          <a class="menu-item" href="#">
            <div class="menu-icon">
              <img src="รูป/profile 2.png" alt="ID Card" />
            </div>
            <span class="menu-label">ID Card</span>
            <span class="menu-arrow">›</span>
          </a>

          <!-- Driving License -->
          <a class="menu-item" href="#">
            <div class="menu-icon">
              <img src="รูป/Car.png" alt="Driving License" />
            </div>
            <span class="menu-label">Driving License</span>
            <span class="menu-arrow">›</span>
          </a>

          <!-- Transcript -->
          <a class="menu-item" href="#">
            <div class="menu-icon">
              <img src="รูป/documents 3.png" alt="Transcript" />
            </div>
            <span class="menu-label">Transcript</span>
            <span class="menu-arrow">›</span>
          </a>

          <!-- Medical Certificate -->
          <a class="menu-item" href="#">
            <div class="menu-icon">
              <img src="รูป/Doctors Bag.png" alt="Medical certificate" />
            </div>
            <span class="menu-label">Medical certificate</span>
            <span class="menu-badge">ขอเอกสาร</span>
          </a>
        </div>
      </div>

      <!-- BOTTOM NAV -->
      <div class="bottom-nav">
        <div class="nav-item active">
          <img src="รูป/Wallet.png" alt="Wallet" />
          <span>Wallet</span>
          <div class="nav-indicator"></div>
        </div>

        <div class="nav-item">
          <img src="รูป/Qr Code.png" alt="My QR" />
          <span>My QR</span>
        </div>

        <div class="nav-item">
          <img src="รูป/scanner-3 2.png" alt="Scan" />
          <span>Scan</span>
        </div>

        <div class="nav-item">
          <img src="รูป/Time Machine.png" alt="History Log" />
          <span>History Log</span>
        </div>
      </div>
    </div>
  </body>
</html>
