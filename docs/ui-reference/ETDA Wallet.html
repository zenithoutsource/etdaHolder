  "110110110100101001101"+
  "000001001001010010010"+

/* ─── NAV ICONS ─── */

const NavQR = ({a}) => {

      <rect x="15" y="1" width="10" height="10" rx="1.5" stroke={c} strokeWidth="1.8"/>

      <rect x="1" y="15" width="10" height="10" rx="1.5" stroke={c} strokeWidth="1.8"/>
      <rect x="3.5" y="17.5" width="5" height="5" rx="0.5" fill={c}/>
      <rect x="15" y="15" width="4" height="4" rx="0.5" fill={c}/>
      <rect x="21" y="15" width="4" height="4" rx="0.5" fill={c}/>

const NavScan = ({a}) => {

  return (
    <svg width="28" height="26" viewBox="0 0 28 26" fill="none">
      <path d="M3 9V3.5a1 1 0 011-1H9" stroke={c} strokeWidth="2" strokeLinecap="round"/>
      <path d="M25 9V3.5a1 1 0 00-1-1h-5" stroke={c} strokeWidth="2" strokeLinecap="round"/>

      <path d="M3 17v5.5a1 1 0 001 1h5" stroke={c} strokeWidth="2" strokeLinecap="round"/>

};
const NavHistory = ({a}) => {

/* ─── PERSON PHOTO ─── */
const PersonPhoto = ({style={}}) => (
  <div style={{overflow:'hidden',background:'#c8d3e0',...style}}>
    <svg viewBox="0 0 100 130" width="100%" height="100%">
      <rect width="100" height="130" fill="#c8d4e0"/>

      <ellipse cx="50" cy="125" rx="44" ry="38" fill="#98adc0"/>
      <rect x="22" y="88" width="56" height="42" rx="2" fill="#2a3e6a" opacity="0.55"/>
    </svg>
  </div>
);

/* ─── QR CODE ─── */
const QRCodeSVG = () => {
  const N=21, cell=9, size=N*cell;
  return (
    <svg viewBox={`0 0 ${size} ${size}`} width={size} height={size} style={{display:'block'}}>
      <rect width={size} height={size} fill="white"/>
      {QR_STR.split('').map((v,i) => {
        if(v!=='1') return null;
        const r=Math.floor(i/N), c=i%N;
        return <rect key={i} x={c*cell} y={r*cell} width={cell} height={cell} fill="#0a1432"/>;
      })}
    </svg>
  );
};

/* ─── STATUS BAR ─── */
const StatusBar = () => (
  <div style={{background:'#002887',padding:'13px 22px 7px',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>

      </svg>
      <svg width="26" height="12" viewBox="0 0 26 12" fill="none">
        <rect x="0.5" y="1" width="22" height="10" rx="2" stroke="white" strokeWidth="1.5"/>
        <rect x="23" y="4" width="2" height="4" rx="1" fill="white" opacity="0.6"/>

    </div>

/* ─── TOP BAR ─── */
const TopBar = ({title, onBack, onClose}) => (

    <span style={{color:'white',fontSize:20,fontWeight:600,flex:1,textAlign:'center',letterSpacing:'.2px'}}>{title}</span>
    {onClose && (
      <button onClick={onClose} style={{position:'absolute',right:16,background:'none',border:'none',cursor:'pointer',padding:6}}>
        <IcoClose/>
      </button>

);

/* ─── BOTTOM NAV ─── */
const BottomNav = ({active, onNav}) => (

);

/* ═══════════════════════════════════════

═══════════════════════════════════════ */
const HomeScreen = ({navigate}) => {

const ScanQRScreen = ({navigate, goTo}) => {
  const [lineY, setLineY] = useState(10);
  const [scanned, setScanned] = useState(false);

  /* scan-line animation */
  useEffect(() => {
    let pos = 10, dir = 1;
    const id = setInterval(() => {
      pos += dir * 1.8;
      if (pos >= 88) dir = -1;
      if (pos <= 10) dir = 1;
      setLineY(pos);
    }, 14);
    return () => clearInterval(id);
  }, []);

  /* auto-navigate after 3s */
  useEffect(() => {
    const t = setTimeout(() => {
      setScanned(true);
      setTimeout(() => navigate('consent_request'), 600);
    }, 3000);
    return () => clearTimeout(t);
  }, []);

  const handleTap = () => {
    if (scanned) return;
    setScanned(true);
    setTimeout(() => navigate('consent_request'), 400);
  };

  return (
    <div style={{background:'#e8ecf0',flex:1,display:'flex',flexDirection:'column',minHeight:700}}>
      <TopBar title="Wallet"/>
      {/* blue divider */}
      <div style={{height:3,background:'#002887'}}/>

        <div style={{fontSize:20,fontWeight:700,color:'#002887',whiteSpace:'nowrap'}}>Scan QR code</div>
        {/* scanner box */}

          style={{width:'100%',maxWidth:310,aspectRatio:'1',background:'#c8cdd4',borderRadius:8,position:'relative',overflow:'hidden',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',boxShadow:'inset 0 2px 12px rgba(0,0,0,0.12)'}}>
          {/* corner brackets */}
          <div style={{position:'absolute',top:14,left:14,width:36,height:36,borderTop:'3.5px solid white',borderLeft:'3.5px solid white',borderRadius:'4px 0 0 0'}}/>
          <div style={{position:'absolute',top:14,right:14,width:36,height:36,borderTop:'3.5px solid white',borderRight:'3.5px solid white',borderRadius:'0 4px 0 0'}}/>
          <div style={{position:'absolute',bottom:14,left:14,width:36,height:36,borderBottom:'3.5px solid white',borderLeft:'3.5px solid white',borderRadius:'0 0 0 4px'}}/>
          <div style={{position:'absolute',bottom:14,right:14,width:36,height:36,borderBottom:'3.5px solid white',borderRight:'3.5px solid white',borderRadius:'0 0 4px 0'}}/>
          {/* QR code */}
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:10,padding:16}}>
            <QRCodeSVG/>
            <div style={{fontSize:13,fontWeight:700,color:'#002887',letterSpacing:.3,whiteSpace:'nowrap'}}>QR Code</div>

            <div style={{position:'absolute',inset:0,background:'rgba(34,166,90,0.18)',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <div style={{width:64,height:64,borderRadius:'50%',background:'#22a65a',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 20px rgba(34,166,90,0.4)'}}>

const FaceScanScreen = ({navigate, goBack, faceDest}) => {
  const [pct, setPct] = useState(0);
  useEffect(()=>{
    let id;
    id = setInterval(()=>{
      setPct(p=>{
        if(p>=100){clearInterval(id);return 100;}
        return p+1.4;
      });
    }, 46);
    return ()=>clearInterval(id);
  },[]);
  useEffect(()=>{
    if(pct>=100){
      const t=setTimeout(()=>navigate(faceDest||'consent_success'),650);
      return ()=>clearTimeout(t);
    }
  },[pct]);

  const R=92, circ=2*Math.PI*R;
  const offset=circ*(1-Math.min(pct,100)/100);
  return (
    <div style={{background:'white',flex:1}}>
      <TopBar title="Wallet" onClose={goBack}/>
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'32px 20px 24px',gap:22}}>
        <div style={{fontSize:21,fontWeight:700,color:'#002887'}}>กำลังสแกนใบหน้า...</div>
        <svg width="214" height="214" viewBox="0 0 214 214">
          <circle cx="107" cy="107" r={R} fill="#dde4ed"/>
          <circle cx="107" cy="107" r={R} fill="none" stroke="#e2e8f0" strokeWidth="7"/>
          <circle cx="107" cy="107" r={R} fill="none" stroke="#22a65a" strokeWidth="7"
            strokeDasharray={circ} strokeDashoffset={offset}
            strokeLinecap="round" transform="rotate(-90 107 107)" style={{transition:'stroke-dashoffset 0.1s linear'}}/>

/* ═══════════════════════════════════════
   APP
═══════════════════════════════════════ */
const App = () => {
  const [stack, setStack] = useState(['home']);
  const [tab, setTab] = useState('wallet');
  const [faceDest, setFaceDest] = useState('consent_success');

  const navigate = (scr, dest) => {
    if(dest) setFaceDest(dest);
    setStack(p=>[...p, scr]);
  };
  const goBack = () => setStack(p => p.length>1 ? p.slice(0,-1) : p);
  const goTo = (scr) => {
    setStack([scr]);
    const t={home:'wallet',my_qr:'myqr',history:'history'};
    if(t[scr]) setTab(t[scr]);
  };
  const navToTab = (t) => {
    setTab(t);
    const s={wallet:'home',myqr:'my_qr',scan:'scan_qr',history:'history'};
    setStack([s[t]]);
  };

  const cur = stack[stack.length-1];
  const hideNav = ['face_scan','scan_qr'].includes(cur);
  const sp = {navigate, goBack, goTo, faceDest};

  return (
    <div style={{display:'flex',justifyContent:'center',alignItems:'flex-start',minHeight:'100vh',background:'#bfc8d4',padding:'20px 0',fontFamily:"'Sarabun', sans-serif"}}>
      <div style={{width:390,height:844,background:'#f0f3f8',borderRadius:44,overflow:'hidden',boxShadow:'0 24px 60px rgba(0,0,0,0.32)',display:'flex',flexDirection:'column',position:'relative'}}>
        <StatusBar/>
        <div style={{flex:1,overflowY:'auto',paddingBottom:hideNav?0:76,display:'flex',flexDirection:'column'}}>
          {cur==='home'            && <HomeScreen {...sp}/>}
          {cur==='id_card'         && <IDCardScreen {...sp}/>}
          {cur==='my_qr'           && <MyQRScreen {...sp}/>}
          {cur==='history'         && <HistoryScreen {...sp}/>}
          {cur==='scan_qr'          && <ScanQRScreen {...sp}/>}
          {cur==='consent_request' && <ConsentRequestScreen {...sp}/>}
          {cur==='id_card_confirm' && <IDCardConfirmScreen {...sp}/>}
          {cur==='face_prep'       && <FacePrepScreen {...sp}/>}
          {cur==='face_scan'       && <FaceScanScreen {...sp}/>}
          {cur==='consent_success' && <ConsentSuccessScreen {...sp}/>}
          {cur==='verifier'        && <VerifierScreen {...sp}/>}
          {cur==='verifier_success'&& <VerifierSuccessScreen {...sp}/>}
        </div>
        {!hideNav && <BottomNav active={tab} onNav={navToTab}/>}
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
